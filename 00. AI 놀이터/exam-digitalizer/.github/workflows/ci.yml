name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Lint ──────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        working-directory: 00. AI 놀이터/exam-digitalizer/backend
        run: ruff check .

  # ─── Test ──────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exam_digitalizer_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 9000:9000

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/exam_digitalizer_test
      REDIS_URL: redis://localhost:6379/0
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: exam-storage-test
      JWT_SECRET: ci-test-secret
      LLM_MODE: mock
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: 00. AI 놀이터/exam-digitalizer/backend
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: 00. AI 놀이터/exam-digitalizer/backend
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: 00. AI 놀이터/exam-digitalizer/backend/coverage.xml

  # ─── Build ─────────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t exam-backend:ci "./00. AI 놀이터/exam-digitalizer/backend"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build frontend
        working-directory: 00. AI 놀이터/exam-digitalizer/frontend
        run: |
          npm ci
          npm run build
