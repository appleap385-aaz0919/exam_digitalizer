# 프로덕션 Docker Compose
# 사용: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    restart: always
    environment:
      - APP_ENV=production
      - LLM_MODE=real
      - LOG_LEVEL=WARNING
      - CORS_ORIGINS=https://exam.example.com
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --no-access-log
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  db:
    restart: always
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secure-password-here}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    restart: always
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-secure-minio-password}
    volumes:
      - minio_prod:/data
    deploy:
      resources:
        limits:
          memory: 1G

  orchestrator:
    restart: always
    environment:
      - LOG_LEVEL=WARNING

  worker:
    restart: always
    environment:
      - LOG_LEVEL=WARNING
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G

  # Nginx 리버스 프록시
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  pgdata_prod:
  minio_prod:
