version: "3.9"

services:
  db_test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exam_digitalizer_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exam_digitalizer_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test_net

  redis_test:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test_net

  minio_test:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test_net

  test_runner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: pytest tests/ -v --cov=. --cov-report=term-missing
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db_test:5432/exam_digitalizer_test
      REDIS_URL: redis://redis_test:6379/0
      S3_ENDPOINT: http://minio_test:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: exam-storage-test
      JWT_SECRET: test-secret-key
      LLM_MODE: mock
      APP_ENV: test
    depends_on:
      db_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
      minio_test:
        condition: service_healthy
    networks:
      - test_net

networks:
  test_net:
    driver: bridge
