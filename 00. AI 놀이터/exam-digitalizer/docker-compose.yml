services:
  # ─── PostgreSQL ────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: exam_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exam_digitalizer
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exam_digitalizer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exam_net

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: exam_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exam_net

  # ─── MinIO ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: exam_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exam_net

  # ─── Backend API 서버 ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exam_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      - LLM_MODE=proxy
      - LLM_PROXY_URL=http://host.docker.internal:3100
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - exam_net

  # ─── Orchestrator (단일 인스턴스, 상태 정합성) ──────────────
  orchestrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exam_orchestrator
    command: python -m agents.orchestrator
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: unless-stopped
    networks:
      - exam_net

  # ─── Worker (병렬 처리, consumer group) ────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m agents.worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped
    networks:
      - exam_net

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exam_frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - exam_net

volumes:
  db_data:
  redis_data:
  minio_data:

networks:
  exam_net:
    driver: bridge
